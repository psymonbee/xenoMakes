<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level Designer — Coin Quest</title>
  <style>
    /* Same dark room as the game, so the canvas pops in the middle. */
    html, body {
      margin: 0;
      height: 100%;
      background: #1e2a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    canvas { image-rendering: pixelated; } /* keep sprites crisp, not blurry */
  </style>
</head>
<body>
  <!-- Load the Kaplay game library (same pinned version as the game). -->
  <script src="https://unpkg.com/kaplay@3001.0.19/dist/kaplay.js"></script>

  <!-- Load each extra art pack's manifest BEFORE palette.js, so the shared
       sprite registry can see it. Add a line here for every new pack. -->
  <script src="assets/packs/new-platformer/pack.js"></script>

  <!-- Load the shared sprite registry (used by BOTH the editor and the game). -->
  <script src="palette.js"></script>

  <!-- Load the shared multi-level "save box" (home page, editor + game all use it). -->
  <script src="levels.js"></script>

  <!-- Load OUR level-designer code. -->
  <script src="editor.js"></script>
</body>
</html>
